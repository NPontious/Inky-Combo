<style>
    .calendar-entry {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-bottom: 10px;
    }
    .color-picker {
        width: 40px;
        height: 38px;
        padding: 0;
        border: none;
        cursor: pointer;
    }
    .remove-btn {
        background: none;
        border: none;
        color: red;
        font-size: 1.2rem;
        cursor: pointer;
    }
</style>

<div class="form-group">
  <label class="form-label">Calendars:</label>
  <div id="calendarList"></div>
  <button type="button" id="addCalendarBtn" class="form-input collapsible" onclick="addCalendarInput('', '#000000')">Add Calendar</button>
</div>

<div class="form-group">
    <label class="form-label">Location (Weather): </label>
    <div class="form-group">
        <span>Latitude </span>
        <input type="text" id="latitude" name="latitude" class="form-input" value="40.7128" />
    </div>
    <div class="form-group">
        <span>Longitude </span>
        <input type="text" id="longitude" name="longitude" class="form-input" value="-74.0060" />
    </div>
</div>
<div class="form-group">
    <label for="units" class="form-label">Units:</label>
    <select id="units" name="units" class="form-input">
        <option value="imperial">Imperial (°F)</option>
        <option value="metric">Metric (°C)</option>
        <option value="standard">Standard (K)</option>
    </select>
</div>
<div class="form-group">
    <label for="fontSize" class="form-label">Font Size:</label>
    <select id="fontSize" name="fontSize" class="form-input">
        <option value="x-small">Extra Small</option>
        <option value="small">Small</option>
        <option value="normal" selected>Normal</option>
        <option value="large">Large</option>
        <option value="x-large">Extra Large</option>
    </select>
</div>
<div class="form-group">
    <label for="weatherLayout" class="form-label">Weather Layout:</label>
    <select id="weatherLayout" name="weatherLayout" class="form-input">
        <option value="full" selected>Full (Graph & 5-Day Forecast)</option>
        <option value="hourly">Hourly Graph Only</option>
        <option value="forecast">5-Day Forecast Only</option>
        <option value="none">None (Disabled)</option>
    </select>
</div>
<div class="form-group">
    <label class="form-label">Timeline Range (Hours):</label>
    <div style="display: flex; gap: 10px;">
        <div style="flex: 1;">
            <span>Start</span>
            <input type="number" id="startTimeInterval" name="startTimeInterval" class="form-input" min="0" max="24" value="6" />
        </div>
        <div style="flex: 1;">
            <span>End</span>
            <input type="number" id="endTimeInterval" name="endTimeInterval" class="form-input" min="0" max="24" value="22" />
        </div>
    </div>
</div>

<script>
    function addCalendarInput(url = '', color = '#000000') {
        const calendarList = document.getElementById('calendarList');

        const wrapper = document.createElement('div');
        wrapper.classList.add('calendar-entry');
        wrapper.classList.add('form-group');

        const colorInput = document.createElement('input');
        colorInput.type = 'color';
        colorInput.name = 'calendarColors[]';
        colorInput.classList.add('color-picker');
        colorInput.value = color;

        const urlInput = document.createElement('input');
        urlInput.type = 'text';
        urlInput.name = 'calendarURLs[]';
        urlInput.placeholder = 'Calendar URL';
        urlInput.required = true;
        urlInput.classList.add('form-input');
        urlInput.value = url;

        const removeBtn = document.createElement('button');
        removeBtn.type = 'button';
        removeBtn.innerText = '✕';
        removeBtn.classList.add('remove-btn');
        removeBtn.onclick = () => wrapper.remove();

        wrapper.appendChild(colorInput);
        wrapper.appendChild(urlInput);
        wrapper.appendChild(removeBtn);

        calendarList.appendChild(wrapper);
    }

    document.addEventListener('DOMContentLoaded', () => {
        let calendars = [{ url: 'https://www.calendarlabs.com/ical-calendar/ics/76/US_Holidays.ics', color: '#000000' }];

        if (loadPluginSettings && pluginSettings["calendarURLs[]"]) {
            // handle case where array might be a single string if only one was saved
            let urls = Array.isArray(pluginSettings["calendarURLs[]"]) ? pluginSettings["calendarURLs[]"] : [pluginSettings["calendarURLs[]"]];
            let colors = Array.isArray(pluginSettings["calendarColors[]"]) ? pluginSettings["calendarColors[]"] : [pluginSettings["calendarColors[]"]];
            
            calendars = urls.map((url, i) => ({
                url: url || '',
                color: colors[i] || '#000000'
            }));
            
            if (pluginSettings.fontSize) {
                document.getElementById('fontSize').value = pluginSettings.fontSize;
            }
            if (pluginSettings.weatherLayout) {
                document.getElementById('weatherLayout').value = pluginSettings.weatherLayout;
            }
            if (pluginSettings.startTimeInterval) {
                document.getElementById('startTimeInterval').value = pluginSettings.startTimeInterval;
            }
            if (pluginSettings.endTimeInterval) {
                document.getElementById('endTimeInterval').value = pluginSettings.endTimeInterval;
            }
        }

        calendars.forEach(({ url, color }) => {
            addCalendarInput(url, color);
        });
    });
</script>
